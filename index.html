<!DOCTYPE html>
<html lang="pl">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ile do końca dropa? | Twitch Drops 🎁</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div class="container">
      <div class="header">
        <h1>Ile do końca dropa?</h1>
        <button class="info-btn" onclick="openModal()">ℹ️</button>
      </div>
      <label for="droptime">Czas trwania (w godzinach):</label>
      <input type="number" id="droptime" name="droptime" required min="1" max="100" step="1" value="2" />
      <label for="timeleft">Aktualna ilość zdobytego dropu (w procentach):</label>
      <input type="number" id="timeleft" name="timeleft" required min="0" max="100" step="1" value="0" />
      <p class="result" id="result"></p>
      <input type="submit" value="Oblicz!" onclick="calculate()" />
    </div>

    <div class="modal-overlay" id="modal">
      <div class="modal">
        <h2>Informacje</h2>
        <p>Program stworzony przez: BrS</p>
        <p>Wersja: 1.0</p>
        <button onclick="closeModal()">Zamknij</button>
      </div>
    </div>
    
    <script src="js/script.js"></script>
  </body>

</html>
